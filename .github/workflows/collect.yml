name: 📡 Collect Signals

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 = 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Collect COMTRADE data
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_KEY }}
        run: python3 comtrade/fetch_comtrade.py
        continue-on-error: true

      - name: Collect OpenSky data
        run: python3 opensky/fetch_opensky.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "📋 无新数据"
          else
            git commit -m "📡 data: $(date +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
