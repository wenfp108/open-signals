name: 📡 Collect Signals

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 = 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Collect COMTRADE data
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 comtrade/fetch_comtrade.py
        continue-on-error: true

      - name: Collect OpenSky data
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 opensky/fetch_opensky.py
        continue-on-error: true

      - name: Keep alive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "last_run: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > .last_run
          git add .last_run
          git commit -m "chore: keep alive [skip ci]" || echo "No changes"
          git pull --rebase
          git push
