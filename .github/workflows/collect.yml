name: 📡 Collect Signals

on:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 = 北京时间 14:00
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Collect COMTRADE data
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 comtrade/fetch_comtrade.py
        continue-on-error: true

      - name: Collect OpenSky data
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python3 opensky/fetch_opensky.py
        continue-on-error: true
